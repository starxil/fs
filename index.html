<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Unity WebGL Player | FORCSZDCR</title>
  <link rel="shortcut icon" href="TemplateData/favicon.ico">
  <link rel="stylesheet" href="TemplateData/style.css">
  <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
    }

    #unity-container {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: black;
      position: relative;
    }

    #unity-canvas {
      width: 100%;
      height: auto; /* 保持宽高比 */
      max-height: 100%;
      display: block;
    }

    #unity-loading-bar, #unity-warning {
      position: absolute;
      width: 100%;
      left: 0;
      text-align: center;
      pointer-events: none;
    }

    #unity-loading-bar {
      top: 40%;
    }

    #unity-warning {
      top: 0;
    }

    /* 底部相关元素已经删除，不再需要显示水印 */
  </style>
</head>
<body>
  <div id="unity-container">
    <canvas id="unity-canvas" tabindex="-1"></canvas>
    <div id="unity-loading-bar">
      <div id="unity-logo"></div>
      <div id="unity-progress-bar-empty">
        <div id="unity-progress-bar-full"></div>
      </div>
    </div>
    <div id="unity-warning"></div>
  </div>

  <script>
    var container = document.querySelector("#unity-container");
    var canvas = document.querySelector("#unity-canvas");
    var loadingBar = document.querySelector("#unity-loading-bar");
    var progressBarFull = document.querySelector("#unity-progress-bar-full");
    var warningBanner = document.querySelector("#unity-warning");

    function unityShowBanner(msg, type) {
      function updateBannerVisibility() {
        warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
      }
      var div = document.createElement('div');
      div.innerHTML = msg;
      warningBanner.appendChild(div);
      if (type == 'error') div.style = 'background: red; padding: 10px;';
      else {
        if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
        setTimeout(function() {
          warningBanner.removeChild(div);
          updateBannerVisibility();
        }, 5000);
      }
      updateBannerVisibility();
    }

    var buildUrl = "Build"; // 确认 Build 文件夹位置
    var loaderUrl = buildUrl + "/FSWebGLv0.11.loader.js";
    var config = {
      dataUrl: buildUrl + "/FSWebGLv0.11.data",
      frameworkUrl: buildUrl + "/FSWebGLv0.11.framework.js",
      codeUrl: buildUrl + "/FSWebGLv0.11.wasm",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "DefaultCompany",
      productName: "FORCSZDCR",
      productVersion: "1.0",
      showBanner: unityShowBanner,
    };

    loadingBar.style.display = "block";

    // 16:9 宽高比自适应
    function resizeCanvas() {
      const containerWidth = window.innerWidth;
      const containerHeight = window.innerHeight;
      const gameRatio = 16 / 9;

      let width = containerWidth;
      let height = containerWidth / gameRatio;

      if (height > containerHeight) {
        height = containerHeight;
        width = containerHeight * gameRatio;
      }

      canvas.style.width = width + "px";
      canvas.style.height = height + "px";
    }

    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    var script = document.createElement("script");
    script.src = loaderUrl;
    script.onload = () => {
      createUnityInstance(canvas, config, (progress) => {
        progressBarFull.style.width = 100 * progress + "%";
      }).then((unityInstance) => {
        loadingBar.style.display = "none";
      }).catch((message) => {
        alert(message);
      });
    };

    document.body.appendChild(script);
  </script>
</body>
</html>
